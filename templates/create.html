{% extends "base.html" %}

{% block title %}Create Reel - AI Reel Generator{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/create.css') }}">
{% endblock %}

{% block content %}
<section class="upload-section">

    <div class="container">

        <div class="upload-container">

            <h1 class="upload-title">
                Create Your Reel
            </h1>

            <p class="upload-instructions">
                Upload videos or images and generate AI narrated reels.
            </p>

            <form
                action="/create"
                enctype="multipart/form-data"
                method="post"
                class="dropzone"
                id="myDropzone"
            >

                <div class="fallback">

                    <div id="fileInputs">

                        <div class="file-input-group">

                            <input
                                name="file1"
                                type="file"
                                class="file-input"
                            />

                            <input
                                name="uuid"
                                type="hidden"
                                value="{{ myid }}"
                            />

                            <button
                                type="button"
                                class="remove-file-btn"
                                onclick="removeFileInput(this)"
                                disabled
                            >
                                ×
                            </button>

                        </div>

                    </div>

                    <button
                        type="button"
                        class="add-file-btn"
                        onclick="addFileInput()"
                    >
                        + Add File
                    </button>

                </div>

                <!-- TEXT INPUT -->
                <div class="text-input-container">

                    <textarea
                        class="text-input"
                        id="textInput"
                        name="text"
                        placeholder="Enter narration text here..."
                        rows="4"
                    ></textarea>

                </div>

                <!-- VOICE SELECTOR -->
                <div class="voice-container">

                    <label class="voice-label">
                        Select AI Voice
                    </label>

                    <select
                        name="voice"
                        class="voice-select"
                    >

                        <optgroup label="Free Voices">

                            <option value="pNInz6obpgDQGcFmaJgB">
                                Adam (Male)
                            </option>

                            <option value="EXAVITQu4vr4xnSDxMaL">
                                Bella (Female)
                            </option>

                            <option value="ErXwobaYiN019PkySvjV">
                                Antoni (Deep Male)
                            </option>

                            <option value="MF3mGyEYCl7XYWbV9V6O">
                                Elli (Soft Female)
                            </option>

                            <option value="VR6AewLTigWG4xSOukaG">
                                Arnold (Strong Male)
                            </option>

                        </optgroup>

                    </select>

                </div>

                <!-- SUBMIT -->
                <button
                    type="submit"
                    class="submit-btn"
                    id="submitBtn"
                >
                    Create Reel
                </button>

            </form>

        </div>

    </div>

</section>
{% endblock %}

{% block extra_js %}
<script>

    let fileCounter = 2;

    function addFileInput() {

        const fileInputs =
            document.getElementById('fileInputs');

        const newFileInput =
            document.createElement('div');

        newFileInput.className =
            'file-input-group';

        newFileInput.innerHTML = `

            <input
                name="file${fileCounter}"
                type="file"
                class="file-input"
            />

            <button
                type="button"
                class="remove-file-btn"
                onclick="removeFileInput(this)"
            >
                ×
            </button>

        `;

        fileInputs.appendChild(newFileInput);

        fileCounter++;
    }

    function removeFileInput(button) {

        const fileInputGroup =
            button.parentElement;

        fileInputGroup.remove();
    }

</script>
{% endblock %}
